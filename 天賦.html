ipCoca.O%3A%3B" as="script" nonce="9-bNo3DmfXe0thZwdokTKQ"><script data-id="_gd" nonce="9-bNo3DmfXe0thZwdokTKQ">window.WIZ_global_data = {"AEJOSc":false,"ARR9x":true,"AfY8Hf":false,"Ajsvkd":true,"B7TsWc":"","BTQaEe":false,"BdA8rf":true,"CVUPx":false,"DEh2U":false,"DedwT":true,"Di4zjc":false,"DnVkpd":"你是一名流行文化評論員。你會如何向剛接觸 K-pop 的人解釋它在全球的流行趨勢？\n推測 K-pop 為什麼在這些年裡獲得了好口碑和國際級的影響力。\n請以對話的方式寫出答覆，就像跟朋友聊天一樣，務必簡明扼要。∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/d1_543cea334ac88fad3dde3.jpg∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/da1_ac2cd80598e586c1ec7fa.jpg∞朋友：最近聽說 K-pop 很火，你能給我講講嗎？\n我：當然啊，K-pop 是韓國流行音樂的簡稱，近年來在全球掀起了一股熱潮。\n朋友：為什麼 K-pop 會這麼流行？\n我：主要有以下幾個原因：\n- 音樂風格多元化，融合了流行、舞曲、嘻哈、R\u0026B 等元素，能夠滿足不同聽眾的需求。\n- 歌手和舞蹈表演都非常精彩，能夠給人帶來視聽上的享受。\n- K-pop 的 MV 和音樂作品都非常注重視覺效果，在 YouTube 等平台上獲得了大量點擊量。\n- 韓國政府和娛樂公司也積極推動 K-pop 的海外發展，在全球進行宣傳和推廣。\n朋友：聽起來 K-pop 很有吸引力啊。\n我：是的，K-pop 不僅僅是一種音樂，更是一種文化現象。它不僅在音樂領域取得了成功，也帶動了韓國時尚、美妝、食品等產業的發展。\n朋友：那我要去聽聽 K-pop 了！\n我：好的，祝你喜歡！\n此外，我還認為 K-pop 之所以能夠在全球獲得好口碑和國際級的影響力，還與以下幾個因素有關：\n- K-pop 歌曲的歌詞往往具有積極向上的正能量，能夠給人帶來鼓舞和力量。\n- K-pop 歌手和偶像們都非常努力，以身作則，傳遞正面的價值觀。\n- K-pop 的粉絲們非常團結，形成了一個龐大的社群，能夠相互支持和鼓勵。\n總之，K-pop 的成功並非偶然，而是多種因素共同作用的結果。它不僅是韓國文化的代表，也為全球流行音樂注入了新的活力。\n∰請寫一篇文章來比較燕麥奶和杏仁奶。\n比較方式要清晰、簡潔、有條理，最好還能包含幾個有趣的小知識，這樣比較能激發讀者的好奇心。∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/d2_2fbb4e36f893ca7b0d2f9.jpg∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/da2_04f5a28fbdccbd442f9e2.jpg∞燕麥奶 vs. 杏仁奶：哪一種植物奶更適合你？\n燕麥奶和杏仁奶都是近年來非常受歡迎的植物奶，它們都具有低脂、低糖等優點，適合乳糖不耐症者、素食者或想要控制體重的人食用。那麼，這兩種植物奶有什麼區別呢？以下就來做個比較：\n營養成分\n營養素 燕麥奶 杏仁奶\n熱量 106 卡路里/杯 60 卡路里/杯\n蛋白質 1.1 克/杯 1.0 克/杯\n脂肪 4.2 克/杯 3.0 克/杯\n碳水化合物 19.4 克/杯 1.8 克/杯\n膳食纖維 2.7 克/杯 2.5 克/杯\n鈣 37 毫克/杯 30 毫克/杯\n維生素 D 0.2 微克/杯 0.2 微克/杯\n從營養成分來看，燕麥奶的熱量和碳水化合物含量較高，杏仁奶的蛋白質含量較低，但脂肪含量和鈣含量較高。\n口感\n燕麥奶的口感略帶甜味，稠度介於牛奶和豆漿之間，適合用於沖泡咖啡、製作燕麥粥或早餐穀物等。杏仁奶的口感清淡，略帶杏仁的香味，適合直接飲用或製作甜品。\n製作方式\n燕麥奶和杏仁奶的製作方式都很簡單，只需將燕麥或杏仁浸泡在水中，然後用料理機攪打成糊狀，再過濾掉渣即可。\n可持續性\n燕麥奶的生產過程比杏仁奶更具可持續性，因為燕麥的種植需要的水量和土地都比杏仁少。\n小知識\n- 燕麥奶的英文名是「oat milk」，由「oat」（燕麥）和「milk」（牛奶）兩個字組成。\n- 杏仁奶的英文名是「almond milk」，由「almond」（杏仁）和「milk」（牛奶）兩個字組成。\n- 燕麥奶和杏仁奶都含有豐富的膳食纖維，有助於促進消化。\n總結\n燕麥奶和杏仁奶各有優缺點，適合不同需求的人群。如果您正在尋找熱量較低、口感較濃郁的植物奶，燕麥奶是個不錯的選擇。如果您正在尋找蛋白質含量較高、口感較清淡的植物奶，杏仁奶是個不錯的選擇。\n∰我有一株蘭花，但不太知道該如何照顧。你可以提供一些實用的小撇步嗎？\n你是大師級的園藝家，也是一名植物醫師。請教我幾個養蘭花的的小撇步。∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/d3_d9530a95b55115080d897.jpg∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/da3_6262e8c5000e6a6eb7343.jpg∞好的，以下是一些養蘭花的小撇步：\n- 選擇合適的蘭花品種\n蘭花品種繁多，每種蘭花都有其獨特的生長習性。在購買蘭花時，應先了解其生長習性，選擇適合自己家居環境的品種。\n- 提供適當的光照\n蘭花需要充足的散射光，但不能直接照射陽光。夏季可將蘭花放在室內明亮的窗台邊，冬季可將蘭花放在室內光線充足的地方。\n- 保持適宜的溫度和濕度\n蘭花適宜的生長溫度為25-30℃，濕度為60-70%。夏季可將蘭花放在通風良好的地方，冬季可將蘭花放在室內溫暖的環境中。\n- 合理澆水\n蘭花的根部是氣生根，過度澆水會導致根部腐爛。夏季可每週澆水一次，冬季可每兩週澆水一次。澆水時應澆透，但不要讓盆內積水。\n- 適時施肥\n蘭花在生長旺季需要施肥。可每月施一次蘭花專用肥，濃度應稀釋為1/2-1/3。\n- 注意病蟲害防治\n蘭花容易感染病蟲害。在養護過程中，應注意觀察蘭花的狀態，發現異常情況時應及時處理。\n以下是一些養蘭花的實用小技巧：\n- 將蘭花放在通風良好的地方\n蘭花需要良好的通風，以促進根系呼吸。\n- 使用透氣的盆土\n蘭花的根部是氣生根，需要有良好的透氣性。可使用蛇木屑、水苔、樹皮等材料作為盆土。\n- 使用無菌的工具\n在修剪蘭花時，應使用無菌的工具，以防止病菌感染。\n- 定期換盆\n蘭花每隔2-3年需要換一次盆。換盆時應將老化的根系剪掉，並更換新的盆土。\n希望這些小撇步能幫助您養好蘭花。\n以下是一些額外的建議：\n- **如果您是初學者，可以選擇容易養護的蘭花品種，如蝴蝶蘭、兜蘭等。\n- **在養護過程中，要多觀察蘭花的狀態，及時發現問題，並採取相應措施。\n- **如果您遇到養護問題，可以向專業人士諮詢。\n祝您養花愉快！\n","DpimGf":false,"ENrkEf":0,"EOzIkf":"UMwOLzU_6bA","EP1ykd":["/_/*","/corp","/corp/*","/corp2","/corp2/*","/emulator","/emulator/*","/staging","/staging/*"],"FABJ3e":"https://docs.google.com/picker","FL1an":false,"FdrFJe":"-8601441392002052687","GK6dn":"https://geminiweb-pa.clients6.google.com","GdU5Bf":"","GtQXDc":"Give me caption options to tell the world about my new fur baby, Finn. Use emojis∞https://www.gstatic.com/lamda/images/landing/a/u18/en/m1_02050367fdbe8690faba4.jpg∞https://www.gstatic.com/lamda/images/landing/a/u18/en/ma1_21f7d57cc2164a94180f6.png∞Sure, here are some caption options to tell the world about your new fur baby, Finn, using emojis:\n🐶 Meet my new best friend, Finn! He’s a bundle of joy and I can’t wait for all the adventures we’ll have together. #newpuppy #furryfriend #Finn\n🐾 Fin 活動，讓您的客人知道電影之夜的細節。\n • 要求您的客人提前攜帶他們最喜歡的小吃或飲料。\n • 在觀看電影之前玩遊戲或看電視，以幫助您的客人放鬆身心。\n • 在電影結束後討論電影。\n\n以下是一些您可以邀請朋友觀看的電影建議：\n • 喜劇片：喜劇片是一種放鬆和享受的好方法。一些受歡迎的喜劇片包括《伴娘》、《龍蝦》和《21 衝鋒陷陣》。\n • 動畫片：動畫片適合所有年齡段。一些受歡迎的動畫片包括《玩具總動員》、《獅子王》和《冰雪奇緣》。\n • 超級英雄電影：超級英雄電影動作十足，令人興奮。一些受歡迎的超級英雄電影包括《復仇者聯盟》、《黑暗騎士》和《神奇女俠》。\n • 經典電影：經典電影之所以成為經典，是因為它們經久不衰。一些受歡迎的經典電影包括《卡薩布蘭卡》、《公民凱恩》和《教父》。\n\n希望這些提示能幫助您安排一場完美的電影之夜！∰我超愛打電動和畫畫，長大後可能會喜歡哪些工作？∞https://www.gstatic.com/lamda/images/landing/a/u18/zh-TW/d2_ce3a9471060055be3863b.png∞https://www.gstatic.com/lamda/images/landing/a/u18/zh-TW/da2_660f7ff7af3da02ecdd08.png∞根據你的興趣，以下是一些你長大後可能會喜歡的工作：\n\n• 遊戲設計師：遊戲設計師負責構思和開發電子遊戲。他們需要有創造力、技術能力和對遊戲的熱情。\n• 動畫師：動畫師負責創作動畫。他們需要有繪畫、設計和電腦動畫方面的技能。\n• 平面設計師：平面設計師負責設計視覺圖像，例如標誌、廣告和網頁。他們需要有創意和對色彩和排版的理解。\n• 插畫家：插畫家負責為書籍、雜誌和網站創作插圖。他們需要有繪畫和講故事方面的技巧。\n• 藝術家：藝術家可以從事各種工作，例如畫家、雕塑家和攝影師。他們都需要有創意和對藝術媒介的理解。\n\n當然，這只是一些可能性。隨著你的成長和發展，你可能會發現自己對其他工作也有興趣。重要的是要探索你的選擇，並找到適合你的工作。\n\n以下是一些可以幫助你探索興趣和職業選擇的資源：\n• 台灣職涯發展協會：https://www.tcdpa.org/\n• 104人力銀行：https://www.104.com.tw/\n• 1111人力銀行：https://www.1111.com.tw/Expats\n\n你也可以向你的老師、輔導員或家長尋求建議。∰我想要申請軟體工程師實習計畫，該怎麼準備履歷？∞https://www.gstatic.com/lamda/images/landing/a/u18/zh-TW/d3_3a03e7c83f10def8c372b.png∞https://www.gstatic.com/lamda/images/landing/a/u18/zh-TW/da3_3ac38ffe1455e1bfd081b.png∞軟體工程師實習計畫的履歷準備，可以參考以下幾個步驟：\n\n1. 了解職缺要求\n\n首先，仔細閱讀實習職缺的說明，了解職缺要求的學歷、技能、經驗等條件。針對這些條件，列出自己符合的部分，並在履歷中加以強調。\n\n2. 突顯相關技能\n\n軟體工程師需要具備良好的程式設計能力，因此履歷中可以列出自己所擅長的程式語言、框架或工具等。如果有相關的專案經驗，也可以加以描述，例如：\n• 開發過哪些應用程式或網站\n• 使用過的技術有哪些\n• 專案中遇到的挑戰和如何解決\n\n3. 展現解決問題能力\n\n軟體工程師的工作經常需要解決問題，因此履歷中可以描述一些自己解決問題的經驗，例如：\n• 在學期間參與過的專題或比賽\n• 在課堂上遇到的難題和如何克服\n• 個人生活中的經驗\n\n4. 強調學習能力\n\n軟體工程師的領域變化很快，因此需要具備良好的學習能力。履歷中可以描述自己如何學習新技術，例如：\n• 曾經參加過的線上課程或實體課程\n• 自學新技術的心得\n• 參與技術社群或社群活動\n\n5. 注意履歷格式\n\n履歷的格式要清晰易讀，重點內容要一目瞭然。可以參考以下幾點建議：\n• 使用標準的履歷格式\n• 採用適當的字體和字號\n• 善用標題和分隔線\n• 檢查是否有錯別字或文法錯誤\n\n6. 針對不同公司調整履歷\n\n如果要申請多家公司的實習計畫，可以針對不同公司的職缺要求和公司文化，調整履歷的內容和格式。\n以下是一些額外的建議：\n• 可以將履歷和求職信投遞給公司的人資部門，也可以直接向認識的公司員工詢問是否有相關的職缺。\n• 參加校園徵才活動或線上徵才活動，也是一個不錯的方式。\n• 面試前，可以多做準備，練習常見的面試題目。\n\n以下是一些軟體工程師實習履歷的範本：\n• IT軟體工程師履歷範本｜５大地雷別踩：形容詞太多、技術名詞太少 - 104職場力\n• 軟體工程師實習生履歷該怎麼寫？\n\n希望這些資訊對您有所幫助。","VVlN6d":"AIzaSyD6n9asBjvx1yBHfhFhfw_kpS9Faq0BZHM","Vvafkd":false,"W3Yyqf":"114397503831193863539","WZsZ1e":"oDHLCK0itJGnn4kA/AaR75CNlRuph7FLuq","Wv9gkb":true,"XODLxf":true,"Ylro7b":"CgcSBWjK7pYx","YwaBv":false,"Z9dR2":[],"ZT1yof":"https://geminiweb-pa.clients6.google.com","ZjDxHf":"PROD","aHPPod":"","ajWZrd":false,"b5W2zf":"default_BardChatUi","bTPVLd":"%.@.null,null,null,\"https://default-bard-run-dev.corp.goog\"]","cfb2h":"boq_assistant-bard-web-server_20260713.17_p0","d2zJAe":"AIzaSyAPW83vB9zFQqfpMup_cMJdELqDQkWvTho","e3Okd":1,"eptZe":"/_/BardChatUi/","fLTY0d":"","fPDxwd":[97493634,97493656,97892004,98006670,98111346,98134678,105739268,106181830,106250366,106271089,106283306,106310305,106329761,106337958,106412107,106415443,106425845],"fx9U0":false,"gGcLoe":false,"gSs3jc":1,"gnD3ee":"%.@.null,null,null,\"https://drive.google.com/viewer/main\"]","h1eoVe":"https://push.clients6.google.com/upload/","hQN7bb":true,"hsFLT":"%.@.null,10,3]","hwjqj":false,"i1PRRd":"AIzaSyBWW50ghQ5qHpMg1gxHV7U9t0wHE0qIUk4","iCzhFc":false,"kmz9uc":false,"krOCz":{},"lRWJfb":"","lYMXHb":false,"lcsVce":false,"mBsHc":"%.@.null,null,null,\"https://healthapp.google.com/connections/u/0/accountlinking\"]","mXaIFf":false,"nPMdNb":"AIzaSyDmUQ6sj3nbs_ZiSsxsbP7L6qlPDT3cr4Q","nQyAE":{"u2B5ld":"true","Zm72Wd":"en,en-gb,ko,ja,ru,de,fr,zh,zh-CN,zh-TW,es,es-419,es-MX,it,nl,pl,pt,pt-BR,pt-PT,id,th,hi,vi,tr,ar,ar-001,ar-EG,ar-SA,bn,sv,cs,hu,el,fa,ro,da,sk,fi,uk,no,bg,sr,he,hr,lt,sl,et,iw,lv,sw,te,ta,gu,kn,ml,mr,ur,en-AU,en-IN,nl-BE,es-ES,en-CA,fr-CA","yXter":"false","hKW5p":"true","qsGtYd":"true","Ssjdmd":"true","N83Imf":"%.@.\"INVALID\"]"},"oPEP7c":"alivewithsmile@gmail.com","oUbv8e":false,"p9hQne":"https://gemini.gstatic.com/_/boq-bard-web/_/r/","qDCSke":"114397503831193863539","qKIAYe":"feeds/mcudyrk2a4khkz","qwAQke":"BardChatUi","rtQCxc":-480,"svJlae":"Bard","svUc8c":1,"thykhd":"AFWLbD3yKmuu4OLSngKCGaun1Gio9u6vr41GuCFE4IR9uWQ48YJg1Z7-HB5yHAMuD1CpvBCxah4JsAAzE6KVHOUn-uoqpQHTIHypHkdTZ6JWjAv_bjMPIXdNFE90JT4A","u21JSd":false,"u4g7r":"%.@.null,1,3]","uS02ke":"PPBWaq7bJYrKrfcPrtrP8Qc","v7udBe":"","vCjA5b":"","vXmutd":"%.@.\"TW\",\"ZZ\",\"JAHhgIixqXdArf1YJYyTlQ\\u003d\\u003d\"]","wM456e":true,"xFyxkf":1,"xnI9P":false,"xwAfE":true,"y2FhP":"prod","yFnxrf":1957,"yVlrc":"請幫我分析照片裡是什麼植物，並分享幾個栽種跟照顧上的建議。∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/m1_0156b4ed6154dcf2fdaae.jpg∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/ma1_2eade3bd0deecf6830518.jpg∞根據您提供的照片，照片裡的植物是多肉植物，也稱為肉質植物。多肉植物是一種原產於墨西哥和中美洲的植物，具有肥厚的葉片或莖，用來儲存水分。多肉植物相對容易照顧，可以生長在各種氣候條件下。\n照片裡的植物種類\n根據照片裡的植物形態，可以推斷出以下幾種可能的種類：\n- 石蓮花科（Crassulaceae）：石蓮花科是多肉植物中最大的科，包括許多常見的多肉植物種類，如石蓮花、玉樹、壽命花等。照片裡的植物葉片呈橢圓形，與石蓮花科的植物相似。\n- 仙人掌科（Cactaceae）：仙人掌科是多肉植物中另一個重要的科，包括仙人掌、蘆薈、龍舌蘭等。照片裡的植物葉片呈針狀，與仙人掌科的植物相似。\n- 景天科（Crassulaceae）：景天科是多肉植物中又一個重要的科，包括姬朧月、佛珠、朧月等。照片裡的植物葉片呈圓形，與景天科的植物相似。\n栽種和照顧建議\n多肉植物的栽種和照顧相對容易，以下是一些建議：\n**土壤：**多肉植物需要疏鬆、排水良好的土壤。可以使用專門的多肉植物土壤，或自己製作土壤，將園藝土、珍珠岩、蛭石等混合均勻。\n**光照：**多肉植物需要充足的陽光才能生長良好。可以將多肉植物放在陽光充足的地方，但夏季要注意避免強光直射。\n**澆水：**多肉植物的根系對水分非常敏感，過度澆水會導致根系腐爛。一般來說，土壤完全乾燥後再澆水即可。\n**施肥：**多肉植物可以每月施肥一次，使用低氮高磷鉀的肥料。\n以下是一些具體的栽種和照顧建議：\n- 如果您不確定照片裡的植物是什麼種類，可以將照片上傳到植物辨識軟體或網站進行識別。\n- 在栽種多肉植物之前，請先了解該植物的光照、澆水和施肥需求。\n- 多肉植物可以放在室內或室外栽培。如果您將多肉植物放在室內，請確保有充足的陽光。\n- 多肉植物可以用盆栽或花壇栽培。如果您用盆栽栽培，請使用合適大小的盆，並在盆底放置排水層。\n- 多肉植物可以用種子或枝條扦插繁殖。\n希望這些建議對您有所幫助。\n∰我想吃更多蔬菜和水果補充維他命C.假設你是專業營養師，你會建議我怎麼吃？請給我完整且可行的飲食規劃。∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/m2_bbe2b2dda6e59c7c37f2b.jpg∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/ma2_4b67f0135285c218b1298.jpg∞好的，以下是我的建議：\n每日建議攝入量\n成年人每日建議攝入量為 100 毫克。\n食物選擇\n以下是富含維生素 C 的食物：\n水果：芭樂、奇異果、柑橘類水果、草莓、木瓜、鳳梨、西瓜等\n蔬菜：甜椒、花椰菜、羽衣甘藍、西蘭花、青椒、綠葉蔬菜等\n飲食規劃\n以下是一份可行的飲食規劃，可以幫助您每天攝入足夠的維生素 C：\n早餐\n- 燕麥片加水果（例如芭樂、奇異果、草莓）\n- 全麥吐司加水果\n- 蔬菜煎蛋\n午餐\n- 沙拉加烤雞胸肉或魚\n- 蔬菜湯\n- 蔬菜炒飯\n晚餐\n- 烤蔬菜加雞肉或魚\n- 蔬菜燉肉\n- 蔬菜炒麵\n零食\n- 水果\n- 蔬菜棒\n- 堅果\n烹飪技巧\n- 儘量少烹飪蔬菜，以免流失維生素 C。\n- 可以嘗試涼拌、微波等烹飪方式。\n注意事項\n- 維生素 C 是水溶性維生素，過量攝入會隨尿液排出。\n- 維生素 C 可以幫助身體吸收鐵質，因此如果您有缺鐵的情況，也可以多吃富含維生素 C 的食物。\n具體實施\n可以根據自己的喜好和飲食習慣，調整上述飲食規劃。例如，如果您不喜歡吃早餐，可以將早餐的食物分到其他兩餐中。如果您不喜歡吃肉，可以將肉類換成豆類或堅果。\n在開始新的飲食計劃之前，最好先諮詢您的醫生或營養師，以確保適合您的身體狀況。\n∰解釋這個單字：fomo\n假設你是一個 Z 世代，要跟祖父母解釋這個概念。請盡可能詳細解釋這個片語、介紹它的起源並舉幾個使用例子。解釋的時候請簡單說重點，不要太嚴肅。∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/m3_844bce2a360ab486237bb.jpg∞https://www.gstatic.com/lamda/images/landing/a/i18n/zh-TW/ma3_fdec69160955ae46897de.jpg∞嗨，阿公阿嬤，你們知道「FOMO」這個詞嗎？它是「Fear of missing out」的縮寫，意思是「害怕錯過」。這個詞最近在網路上很流行，用來形容一種因為擔心錯過某些機會或經歷而產生的焦慮或不安感。\n「FOMO」這個詞最早出現在 2004 年，當時哈佛商學院的學生帕特里克·肯尼迪（Patrick Kennedy）在他的論文中使用了這個詞。隨著社交媒體的普及，「FOMO」的使用也越來越廣泛。因為社交媒體讓我們可以隨時隨地看到朋友、家人和其他人的最新動態，這也讓我們更容易產生「FOMO」的感覺。\n以下是一些「FOMO」的使用例子：\n- 小明看到朋友在社群媒體上分享了去海邊的照片，他感到很羨慕，因為他沒有時間去海邊。\n- 小華看到同事在公司升職，他感到焦慮，因為他擔心自己會被落後。\n- 小美看到別人買了新手機，她也想買，但她擔心自己買不起。\n要克服「FOMO」，我們可以嘗試以下方法：\n- 減少使用社交媒體的時間。\n- 專注於自己的生活，不要總是比較自己和別人。\n- 學會欣賞自己所擁有的，而不是總是追求更高、更遠的目標。\n阿公阿嬤，希望這個解釋對你們有幫助。\n","ypY7lb":"AIzaSyAHCfkEDYwQD6HuUx2DyX3VylTrKZG7doM","zChJod":"%.@.]","zEdwB":"","znAqjf":"%.@.null,null,\"CM_65ZnR05UDFQpl6wgdLu0zfg\",1784082492652880,[97566007,105998984,106141730,106131672,106285262,106218863,106339897,106427500,106277869,105958692,106039207,1714242,106104861,106072234,98185219,106426587,106129472,106165371,106169036,105666543,106132810,98306182,106084466,106226210,106136827,105504422,100659871,97493634,98134678,106129853,106458972,106084457,106227896,105601814,97508218,106084448,98007827,106071893,105561153,106342759,106258538,106340828,106157970,106326156,106311550,106325499,106436873,98065058,106415443,106329448,106297952,106271089,106026867,106143150,106221460,105494006,105958469,97488662,105763639,105740516,106033596,98007104,106469643,106337958,98436962,106326148,106455136,105810619,105881033,106254252,105725231,105818873,98064486,105939837,106095268,106389686,106086320,106455110,105890830,106294060,106052698,106163834,106242475,105786816,98244924,106101798,98215931,106143679,97442195,97621697,105854213,10623
